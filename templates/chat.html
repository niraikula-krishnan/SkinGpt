<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SkinGPT — AI Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f8fafc;
      color: #1e293b;
    }

    body { display: flex; flex-direction: column; overflow: hidden; }

    .app { flex: 1; display: flex; min-height: 0; }

    .sidebar {
      width: 260px; flex-shrink: 0;
      background: #ffffff;
      border-right: 1px solid #e2e8f0;
      display: flex; flex-direction: column; min-height: 0;
    }

    .sidebar-top { padding: 14px 12px; border-bottom: 1px solid #e2e8f0; }

    .sidebar-new {
      width: 100%; padding: 9px 14px; border-radius: 8px;
      border: 1px solid #cbd5e1; background: #f8fafc;
      color: #334155; font-size: .85rem; font-weight: 600;
      cursor: pointer; transition: background .15s, border-color .15s;
    }
    .sidebar-new:hover { background: #f1f5f9; border-color: #94a3b8; }

    .user-switcher { padding: 10px 12px 8px; border-bottom: 1px solid #e2e8f0; }
    .user-switcher-label {
      font-size: .7rem; color: #94a3b8; text-transform: uppercase;
      letter-spacing: .05em; margin-bottom: 8px; font-weight: 600;
    }
    .user-btns { display: flex; flex-direction: column; gap: 4px; }
    .user-btn {
      padding: 8px 10px; border-radius: 6px;
      border: 1px solid #e2e8f0; background: #ffffff;
      color: #64748b; font-size: .82rem; cursor: pointer; text-align: left;
      transition: background .15s, border-color .15s, color .15s;
    }
    .user-btn:hover { background: #f8fafc; color: #334155; }
    .user-btn.active {
      background: #eff6ff; border-color: #2563eb; color: #1d4ed8; font-weight: 600;
    }

    .chat-list {
      flex: 1; overflow-y: auto; padding: 8px;
      display: flex; flex-direction: column; gap: 4px;
    }

    .chat-item {
      padding: 9px 12px; border-radius: 6px; font-size: .84rem;
      color: #64748b; cursor: pointer;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: background .15s, color .15s;
    }
    .chat-item:hover { background: #f1f5f9; color: #334155; }
    .chat-item.active { background: #eff6ff; color: #1d4ed8; font-weight: 500; }

    .main-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; }

    header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 24px; background: #ffffff;
      border-bottom: 1px solid #e2e8f0; flex-shrink: 0;
    }
    .back-btn {
      text-decoration: none; color: #64748b; font-size: .88rem;
      display: flex; align-items: center; gap: 5px;
    }
    .back-btn:hover { color: #2563eb; }
    .h-dot { width: 8px; height: 8px; border-radius: 50%; background: #2563eb; }
    header strong { font-size: 1rem; color: #0f172a; font-weight: 600; }
    .accuracy-badge {
      margin-left: auto; font-size: .78rem; color: #64748b;
      background: #f8fafc; border: 1px solid #e2e8f0;
      padding: 5px 12px; border-radius: 6px;
    }
    .accuracy-badge.has-value { color: #1d4ed8; background: #eff6ff; border-color: #bfdbfe; }

    .messages { flex: 1; overflow-y: auto; padding: 24px 0; display: flex; flex-direction: column; }

    .msg-row { width: 100%; padding: 16px 0; }
    .msg-row.bot { background: #ffffff; border-bottom: 1px solid #f1f5f9; }

    .msg-inner {
      max-width: 720px; margin: 0 auto; padding: 0 24px;
      display: flex; gap: 12px; align-items: flex-start;
    }

    .avatar {
      width: 32px; height: 32px; border-radius: 6px;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: .8rem; font-weight: 600;
    }
    .avatar.user { background: #2563eb; color: #fff; }
    .avatar.bot { background: #f1f5f9; border: 1px solid #e2e8f0; color: #475569; }

    .msg-content {
      flex: 1; font-size: .95rem; line-height: 1.7;
      color: #334155; white-space: pre-wrap; word-break: break-word; padding-top: 4px;
    }
    .msg-img { max-width: 260px; border-radius: 8px; margin-bottom: 8px; display: block; border: 1px solid #e2e8f0; }

    .pred-card {
      margin-top: 12px; background: #f8fafc;
      border: 1px solid #e2e8f0; border-radius: 8px;
      padding: 14px 16px; display: flex; flex-direction: column; gap: 10px;
    }
    .pred-label { font-size: .95rem; font-weight: 600; color: #0f172a; }
    .pred-conf-row { display: flex; align-items: center; gap: 10px; font-size: .8rem; color: #64748b; }
    .conf-bar-wrap { flex: 1; height: 6px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
    .conf-bar { height: 100%; border-radius: 4px; background: #2563eb; }
    .pred-top3 { display: flex; flex-direction: column; gap: 6px; }
    .t3-item { display: flex; align-items: center; gap: 8px; font-size: .78rem; color: #64748b; }
    .t3-bar-wrap { flex: 1; height: 5px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
    .t3-bar { height: 100%; border-radius: 4px; background: #93c5fd; }
    .t3-score { min-width: 44px; text-align: right; color: #94a3b8; }
    .pred-note { font-size: .78rem; color: #b45309; }

    .typing-row { width: 100%; padding: 14px 0; background: #ffffff; }
    .typing-inner { max-width: 720px; margin: 0 auto; padding: 0 24px; display: flex; gap: 12px; align-items: center; }
    .typing-avatar {
      width: 32px; height: 32px; border-radius: 6px;
      background: #f1f5f9; border: 1px solid #e2e8f0;
      display: flex; align-items: center; justify-content: center; font-size: .85rem; flex-shrink: 0;
    }
    .typing-dots { display: flex; gap: 4px; align-items: center; }
    .typing-dots span {
      width: 6px; height: 6px; border-radius: 50%; background: #94a3b8;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,80%,100%{opacity:.3;} 40%{opacity:1;} }

    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .chip {
      padding: 6px 12px; border-radius: 6px; font-size: .8rem; cursor: pointer;
      border: 1px solid #cbd5e1; color: #475569; background: #ffffff;
      transition: background .15s, border-color .15s;
    }
    .chip:hover { background: #f8fafc; border-color: #2563eb; color: #2563eb; }

    .welcome {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; text-align: center; padding: 40px 24px;
    }
    .welcome-icon { font-size: 2.5rem; }
    .welcome h2 { font-size: 1.35rem; color: #0f172a; font-weight: 600; }
    .welcome p { font-size: .92rem; max-width: 400px; line-height: 1.65; color: #64748b; }

    .input-area {
      flex-shrink: 0; padding: 16px 24px 20px;
      background: #ffffff; border-top: 1px solid #e2e8f0;
    }

    .input-box {
      max-width: 720px; margin: 0 auto;
      display: flex; align-items: center; gap: 10px;
      background: #f8fafc; border: 1px solid #cbd5e1;
      border-radius: 10px; padding: 8px 10px 8px 16px;
    }
    .input-box:focus-within { border-color: #2563eb; background: #ffffff; }

    #msgInput {
      flex: 1; background: none; border: none; outline: none;
      color: #1e293b; font-size: .95rem; font-family: inherit;
      resize: none; max-height: 140px; overflow-y: auto;
      padding: 4px 0; line-height: 1.5;
    }
    #msgInput::placeholder { color: #94a3b8; }

    .attach-btn {
      width: 34px; height: 34px; border-radius: 6px;
      background: #ffffff; border: 1px solid #e2e8f0;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
    }
    .attach-btn:hover { background: #f1f5f9; }
    .attach-btn svg { width: 16px; height: 16px; stroke: #64748b; fill: none; }
    #imgFile { display: none; }

    .send-btn {
      width: 34px; height: 34px; border-radius: 6px;
      background: #2563eb; border: none; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; opacity: .45;
    }
    .send-btn.ready { opacity: 1; }
    .send-btn:hover.ready { background: #1d4ed8; }
    .send-btn svg { width: 15px; height: 15px; fill: #fff; }

    .preview-pill {
      display: none; max-width: 720px; margin: 0 auto 10px;
      align-items: center; gap: 10px;
      background: #f8fafc; border: 1px solid #e2e8f0;
      border-radius: 8px; padding: 8px 12px; font-size: .8rem; color: #64748b;
    }
    .preview-pill.show { display: flex; }
    .preview-pill img { width: 34px; height: 34px; border-radius: 6px; object-fit: cover; }
    .preview-pill .rm { margin-left: auto; cursor: pointer; color: #64748b; }
    .preview-pill .rm:hover { color: #ef4444; }

    .hint-text { max-width: 720px; margin: 8px auto 0; text-align: center; font-size: .72rem; color: #94a3b8; }

    .analytics-chart-wrap {
      margin-top: 14px; padding: 16px;
      background: #f8fafc; border: 1px solid #e2e8f0;
      border-radius: 8px; max-width: 520px;
    }
    .analytics-chart-wrap h4 {
      font-size: .82rem; color: #334155; margin-bottom: 12px; font-weight: 600;
    }

    .chat-list::-webkit-scrollbar, .messages::-webkit-scrollbar { width: 5px; }
    .chat-list::-webkit-scrollbar-thumb, .messages::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

    .disclaimer {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: #fffbeb; border-top: 1px solid #fde68a;
      padding: 16px 24px;
      display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    }
    .disclaimer-text { flex: 1; font-size: .84rem; color: #78350f; line-height: 1.55; }
    .disclaimer-text strong { color: #92400e; }
    .disclaimer-close {
      padding: 7px 16px; border-radius: 6px; cursor: pointer;
      background: #ffffff; border: 1px solid #fcd34d;
      color: #92400e; font-size: .82rem; font-weight: 600;
    }
    .disclaimer-close:hover { background: #fef3c7; }

    @media (max-width: 700px) {
      .sidebar { width: 200px; }
      .msg-inner { padding: 0 14px; }
      .input-area { padding: 12px 14px 16px; }
    }
  </style>
</head>
<body>

<div class="disclaimer" id="disclaimer" style="display:none">
  <span>⚠️</span>
  <div class="disclaimer-text">
    <strong>Medical Disclaimer:</strong> For informational purposes only — always consult a clinician.
  </div>
  <button class="disclaimer-close" id="disclaimerClose">I understand</button>
</div>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-top">
      <button type="button" class="sidebar-new" id="newChatBtn">+ New chat</button>
    </div>
    <div class="user-switcher">
      <div class="user-switcher-label">Active user</div>
      <div class="user-btns" id="userBtns"></div>
    </div>
    <div class="chat-list" id="chatList"></div>
  </aside>

  <div class="main-panel">
    <header>
      <a href="/" class="back-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
        Back
      </a>
      <span class="h-dot"></span>
      <strong>SkinGPT AI</strong>
      <span class="accuracy-badge" id="accuracyBadge">Session Accuracy: —</span>
    </header>

    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🩺</div>
        <h2>How can I help you today?</h2>
        <p>Upload a skin image and ask a question.</p>
      </div>
    </div>

    <div class="input-area">
      <form id="chatForm">
        <div class="preview-pill" id="previewPill">
          <img id="previewImg" src="" alt="">
          <span id="previewName"></span>
          <span class="rm" id="removeImg">✕</span>
        </div>
        <div class="input-box">
          <label class="attach-btn" for="imgFile" title="Attach image">
            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66L9.41 17.41a2 2 0 01-2.83-2.83l8.49-8.48"/>
            </svg>
          </label>
          <input type="file" id="imgFile" accept="image/*">
          <textarea id="msgInput" rows="1" placeholder="Ask about your skin condition…"></textarea>
          <button class="send-btn" id="sendBtn" type="submit" title="Send">
            <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
          </button>
        </div>
        <p class="hint-text">For informational use only — always consult a clinician.</p>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
  const STORAGE_KEY = 'skingpt_chats';

  const form        = document.getElementById('chatForm');
  const disc = document.getElementById('disclaimer');
  const msgInput    = document.getElementById('msgInput');
  const imgFile     = document.getElementById('imgFile');
  const messagesEl  = document.getElementById('messages');
  const welcome     = document.getElementById('welcome');
  const sendBtn     = document.getElementById('sendBtn');
  const previewPill = document.getElementById('previewPill');
  const previewImg  = document.getElementById('previewImg');
  const previewName = document.getElementById('previewName');
  const removeImg   = document.getElementById('removeImg');
  const chatListEl  = document.getElementById('chatList');
  const userBtnsEl  = document.getElementById('userBtns');
  const newChatBtn  = document.getElementById('newChatBtn');

  let CURRENT_USER = 'user_1';
  let usersList = [];

  async function resetSessionAnalytics() {
    try {
      await fetch('/api/session/reset', { method: 'POST' });
    } catch (_) {}
  }

  const isReload = performance.getEntriesByType('navigation')[0]?.type === 'reload';
  if (isReload) {
    sessionStorage.removeItem(STORAGE_KEY);
    resetSessionAnalytics();
  }

  async function loadUsers() {
    try {
      const res = await fetch('/api/users');
      const data = await res.json();
      usersList = data.users || [];
      renderUserButtons();
    } catch (_) {
      usersList = [
        { user_number: 'user_1', user_label: 'User 1', analytics: {} },
        { user_number: 'user_2', user_label: 'User 2', analytics: {} },
        { user_number: 'user_3', user_label: 'User 3', analytics: {} },
      ];
      renderUserButtons();
    }
  }

  function renderUserButtons() {
    userBtnsEl.innerHTML = '';
    usersList.forEach(u => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'user-btn' + (u.user_number === CURRENT_USER ? ' active' : '');
      const count = Object.keys(u.analytics || {}).length;
      btn.textContent = count ? `${u.user_label} (${count} diseases)` : u.user_label;
      btn.addEventListener('click', () => switchUser(u.user_number));
      userBtnsEl.appendChild(btn);
    });
  }

  function switchUser(userNumber) {
    CURRENT_USER = userNumber;
    const u = usersList.find(x => x.user_number === userNumber);
    if (u) getActiveChat().analytics = u.analytics || {};
    renderUserButtons();
  }

  function syncUserAnalytics(analytics) {
    const u = usersList.find(x => x.user_number === CURRENT_USER);
    if (u) u.analytics = analytics || {};
    getActiveChat().analytics = analytics || {};
    renderUserButtons();
  }

  loadUsers();
  if (!sessionStorage.getItem('disc_dismissed')) disc.style.display = 'flex';
  document.getElementById('disclaimerClose').addEventListener('click', () => {
    disc.style.display = 'none';
    sessionStorage.setItem('disc_dismissed', '1');
  });

  function makeChat() {
    return {
      id: 'c' + Date.now() + Math.random().toString(36).slice(2, 6),
      title: 'New chat',
      sessionId: Math.random().toString(36).slice(2),
      accuracy: null,
      analytics: {},
      messages: []
    };
  }

  let store = { activeId: null, chats: [] };
  try {
    const saved = JSON.parse(sessionStorage.getItem(STORAGE_KEY) || 'null');
    if (saved?.chats?.length) store = saved;
  } catch (_) {}
  if (!store.chats.length) {
    const c = makeChat();
    store.chats = [c];
    store.activeId = c.id;
  }

  let SESSION_ID = getActiveChat().sessionId;
  let typingRow = null;

  function getActiveChat() {
    return store.chats.find(c => c.id === store.activeId) || store.chats[0];
  }

  function saveStore() {
    sessionStorage.setItem(STORAGE_KEY, JSON.stringify(store));
  }

  function updateAccuracyBadge(accuracy) {
    const badge = document.getElementById('accuracyBadge');
    if (accuracy) {
      badge.textContent = 'Session Accuracy: ' + accuracy + '%';
      badge.classList.add('has-value');
    } else {
      badge.textContent = 'Session Accuracy: —';
      badge.classList.remove('has-value');
    }
  }

  function renderSidebar() {
    chatListEl.innerHTML = '';
    store.chats.forEach(chat => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'chat-item' + (chat.id === store.activeId ? ' active' : '');
      btn.textContent = chat.title;
      btn.title = chat.title;
      btn.addEventListener('click', () => switchChat(chat.id));
      chatListEl.appendChild(btn);
    });
  }

  function clearMessagesDom() {
    messagesEl.querySelectorAll('.msg-row, .chips, .typing-row, .pred-card').forEach(el => el.remove());
  }

  function addRow(text, role, imgSrc, doScroll = true) {
    if (welcome) welcome.style.display = 'none';
    const row = document.createElement('div');
    row.className = 'msg-row ' + role;
    const inner = document.createElement('div');
    inner.className = 'msg-inner';
    const av = document.createElement('div');
    av.className = 'avatar ' + role;
    av.textContent = role === 'user' ? 'U' : '🩺';
    const content = document.createElement('div');
    content.className = 'msg-content';
    if (imgSrc) {
      const img = document.createElement('img');
      img.src = imgSrc; img.className = 'msg-img';
      content.appendChild(img);
    }
    const textNode = document.createElement('span');
    textNode.textContent = text;
    content.appendChild(textNode);
    inner.appendChild(av);
    inner.appendChild(content);
    row.appendChild(inner);
    messagesEl.appendChild(row);
    if (doScroll) messagesEl.scrollTop = messagesEl.scrollHeight;
    return { textNode, content };
  }

  function renderPredCard(content, pred, accuracy) {
    if (!pred || !pred.label) return;
    const card = document.createElement('div');
    card.className = 'pred-card';
    const conf = parseFloat(pred.confidence);
    const acc  = accuracy ? parseFloat(accuracy) : null;
    card.innerHTML = `
      <div class="pred-label">🔬 ${pred.label}</div>
      <div class="pred-conf-row">
        <span style="min-width:110px">Confidence</span>
        <div class="conf-bar-wrap"><div class="conf-bar" style="width:${conf}%"></div></div>
        <span><strong>${pred.confidence}%</strong></span>
      </div>
      <div class="pred-top3" style="margin-top:4px">
        ${(pred.top3 || []).map(t => `
          <div class="t3-item">
            <span style="min-width:150px;">${t.label}</span>
            <div class="t3-bar-wrap"><div class="t3-bar" style="width:${t.score}%"></div></div>
            <span class="t3-score">${t.score}%</span>
          </div>`).join('')}
      </div>
      ${pred.note ? `<div class="pred-note">⚠️ ${pred.note}</div>` : ''}`;
    content.appendChild(card);
    if (acc !== null) updateAccuracyBadge(accuracy);
  }

  function renderAnalyticsChart(content, analytics) {
    const labels = Object.keys(analytics);
    const values = Object.values(analytics);
    if (!labels.length || typeof Chart === 'undefined') return;

    const wrap = document.createElement('div');
    wrap.className = 'analytics-chart-wrap';
    wrap.innerHTML = '<h4>Session disease analytics</h4>';
    const canvas = document.createElement('canvas');
    wrap.appendChild(canvas);
    content.appendChild(wrap);

    new Chart(canvas, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: 'Count',
          data: values,
          backgroundColor: 'rgba(37, 99, 235, 0.75)',
          borderColor: 'rgba(37, 99, 235, 1)',
          borderWidth: 1,
          borderRadius: 4,
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          y: {
            beginAtZero: true,
            ticks: { stepSize: 1, color: '#64748b' },
            grid: { color: '#e2e8f0' }
          },
          x: {
            ticks: { color: '#64748b', maxRotation: 45, minRotation: 0 },
            grid: { display: false }
          }
        }
      }
    });
  }

  const BASE_CHIPS = [
    'What causes this?',
    'Is it contagious?',
    'When should I see a doctor?',
    'How is it treated?',
    'Provide the analytics of this session'
  ];
  function renderChips(content, label) {
    const chips = label ? [`What is ${label}?`, `What causes ${label}?`, ...BASE_CHIPS.slice(1)] : BASE_CHIPS;
    const wrap = document.createElement('div');
    wrap.className = 'chips';
    chips.forEach(q => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'chip';
      btn.textContent = q;
      btn.addEventListener('click', () => {
        wrap.remove();
        msgInput.value = q;
        updateSendState();
        form.requestSubmit();
      });
      wrap.appendChild(btn);
    });
    content.appendChild(wrap);
  }

  function renderMessages(chat) {
    clearMessagesDom();
    if (!chat.messages.length) {
      welcome.style.display = 'flex';
      updateAccuracyBadge(null);
      return;
    }
    welcome.style.display = 'none';
    chat.messages.forEach(msg => {
      if (msg.role === 'user') {
        addRow(msg.text, 'user', msg.img || null, false);
      } else {
        const { textNode, content } = addRow(msg.text, 'bot', null, false);
        if (msg.imageUrl) {
          const img = document.createElement('img');
          img.src = msg.imageUrl; img.className = 'msg-img';
          content.insertBefore(img, textNode);
        }
        if (msg.prediction) renderPredCard(content, msg.prediction, msg.accuracy);
        if (msg.showChart && msg.analytics) renderAnalyticsChart(content, msg.analytics);
      }
    });
    updateAccuracyBadge(chat.accuracy);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function switchChat(id) {
    if (id === store.activeId) return;
    store.activeId = id;
    SESSION_ID = getActiveChat().sessionId;
    renderSidebar();
    renderMessages(getActiveChat());
    saveStore();
  }

  function startNewChat() {
    const chat = makeChat();
    store.chats.unshift(chat);
    store.activeId = chat.id;
    SESSION_ID = chat.sessionId;
    msgInput.value = '';
    msgInput.style.height = 'auto';
    imgFile.value = '';
    previewPill.classList.remove('show');
    updateSendState();
    renderSidebar();
    renderMessages(chat);
    saveStore();
  }

  newChatBtn.addEventListener('click', startNewChat);

  function showTyping() {
    if (welcome) welcome.style.display = 'none';
    typingRow = document.createElement('div');
    typingRow.className = 'typing-row';
    typingRow.innerHTML = '<div class="typing-inner"><div class="typing-avatar">🩺</div><div class="typing-dots"><span></span><span></span><span></span></div></div>';
    messagesEl.appendChild(typingRow);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
  function hideTyping() {
    if (typingRow) { typingRow.remove(); typingRow = null; }
  }

  function updateSendState() {
    sendBtn.classList.toggle('ready', !!(msgInput.value.trim() || imgFile.files.length));
  }

  msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = msgInput.scrollHeight + 'px';
    updateSendState();
  });
  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
  });
  imgFile.addEventListener('change', () => {
    if (imgFile.files.length) {
      const reader = new FileReader();
      reader.onload = e => {
        previewImg.src = e.target.result;
        previewName.textContent = imgFile.files[0].name;
        previewPill.classList.add('show');
      };
      reader.readAsDataURL(imgFile.files[0]);
    }
    updateSendState();
  });
  removeImg.addEventListener('click', () => {
    imgFile.value = '';
    previewPill.classList.remove('show');
    updateSendState();
  });

  form.addEventListener('submit', async e => {
    e.preventDefault();
    const text = msgInput.value.trim();
    if (!text && !imgFile.files.length) return;

    const chat = getActiveChat();
    document.querySelectorAll('.chips').forEach(c => c.remove());

    const fileToSend = imgFile.files[0];
    let userImg = null;
    if (fileToSend) {
      userImg = await new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = ev => resolve(ev.target.result);
        r.onerror = reject;
        r.readAsDataURL(fileToSend);
      });
    }

    const userText = text || '📷 Image attached';
    addRow(userText, 'user', userImg);
    chat.messages.push({ role: 'user', text: userText, img: userImg });

    if (chat.title === 'New chat' && text) {
      chat.title = text.length > 32 ? text.slice(0, 32) + '…' : text;
      renderSidebar();
    }

    msgInput.value = '';
    msgInput.style.height = 'auto';
    previewPill.classList.remove('show');
    updateSendState();
    showTyping();

    const data = new FormData();
    data.append('message', text);
    data.append('session_id', SESSION_ID);
    data.append('user_number', CURRENT_USER);
    if (fileToSend) { data.append('image', fileToSend); imgFile.value = ''; }

    try {
      const res = await fetch('/chat', { method: 'POST', body: data });
      const json = await res.json();
      hideTyping();

      const { textNode, content } = addRow(json.reply || 'No reply.', 'bot');
      const botMsg = { role: 'bot', text: json.reply || 'No reply.', imageUrl: null, prediction: null, accuracy: null, analytics: null, showChart: false };

      if (json.image_url) {
        const img = document.createElement('img');
        img.src = json.image_url; img.className = 'msg-img';
        content.insertBefore(img, textNode);
        botMsg.imageUrl = json.image_url;
      }
      if (json.prediction) {
        renderPredCard(content, json.prediction, json.accuracy);
        renderChips(content, json.prediction.label);
        botMsg.prediction = json.prediction;
        botMsg.accuracy = json.accuracy;
        chat.accuracy = json.accuracy;
      } else {
        renderChips(content, null);
      }
      if (json.analytics) syncUserAnalytics(json.analytics);
      if (json.show_chart && json.analytics) {
        renderAnalyticsChart(content, json.analytics);
        botMsg.analytics = json.analytics;
        botMsg.showChart = true;
      }
      chat.messages.push(botMsg);
      saveStore();
      loadUsers();
    } catch (err) {
      hideTyping();
      addRow('Error: ' + err.message, 'bot');
      chat.messages.push({ role: 'bot', text: 'Error: ' + err.message });
      saveStore();
    }
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });

  renderSidebar();
  renderMessages(getActiveChat());
</script>
</body>
</html>
